<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6d3"/>
      <stop offset="100%" stop-color="#e8d5c0"/>
    </linearGradient>
    <linearGradient id="bowl-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0704e"/>
      <stop offset="60%" stop-color="#8b5e3c"/>
      <stop offset="100%" stop-color="#6d4830"/>
    </linearGradient>
    <linearGradient id="bowl-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a47a"/>
      <stop offset="100%" stop-color="#b8906a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="310" rx="120" ry="18" fill="#d4c0a8" opacity="0.5"/>
  <!-- Bowl body -->
  <path d="M85 210 Q85 305 200 305 Q315 305 315 210 Z" fill="url(#bowl-body)"/>
  <!-- Bowl rim -->
  <ellipse cx="200" cy="210" rx="115" ry="38" fill="#a87854"/>
  <!-- Bowl interior -->
  <ellipse cx="200" cy="210" rx="104" ry="32" fill="url(#bowl-inner)"/>
  <!-- Glaze highlight -->
  <ellipse cx="178" cy="206" rx="48" ry="14" fill="#d4b896" opacity="0.4"/>
  <!-- Subtle texture lines on body -->
  <path d="M120 245 Q200 262 280 245" stroke="#7a4e30" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M112 265 Q200 284 288 265" stroke="#7a4e30" stroke-width="0.8" fill="none" opacity="0.25"/>
  <path d="M118 285 Q200 302 282 285" stroke="#7a4e30" stroke-width="0.8" fill="none" opacity="0.2"/>
  <!-- Label -->
  <text x="200" y="368" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8b6e55" letter-spacing="2">STONEWARE BOWL</text>
</svg>