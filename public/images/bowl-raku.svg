<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a30"/>
      <stop offset="100%" stop-color="#1e1e24"/>
    </linearGradient>
    <linearGradient id="raku-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c3e3a"/>
      <stop offset="30%" stop-color="#4a6e5c"/>
      <stop offset="50%" stop-color="#8b7355"/>
      <stop offset="70%" stop-color="#3d5a6e"/>
      <stop offset="100%" stop-color="#5c4a6e"/>
    </linearGradient>
    <linearGradient id="metallic" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8956a"/>
      <stop offset="30%" stop-color="#d4b088"/>
      <stop offset="50%" stop-color="#8ba5a0"/>
      <stop offset="80%" stop-color="#c4a070"/>
      <stop offset="100%" stop-color="#7a8e8a"/>
    </linearGradient>
    <radialGradient id="iridescent" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#8bbab0" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#c4a070" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6a5a8e" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="312" rx="112" ry="16" fill="#0a0a0e" opacity="0.4"/>
  <!-- Bowl body -->
  <path d="M98 222 Q98 307 200 307 Q302 307 302 222 Z" fill="url(#raku-body)"/>
  <!-- Iridescent overlay -->
  <path d="M98 222 Q98 307 200 307 Q302 307 302 222 Z" fill="url(#iridescent)"/>
  <!-- Crackle texture -->
  <path d="M142 242 L157 262 L147 287" stroke="#d4b088" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M182 232 L192 262 L177 292" stroke="#8ba5a0" stroke-width="0.5" fill="none" opacity="0.3"/>
  <path d="M232 237 L227 267 L242 292" stroke="#d4b088" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M262 242 L272 272 L267 297" stroke="#8ba5a0" stroke-width="0.5" fill="none" opacity="0.3"/>
  <path d="M152 252 L200 257 L262 250" stroke="#c4a070" stroke-width="0.4" fill="none" opacity="0.3"/>
  <!-- Rim -->
  <ellipse cx="200" cy="222" rx="102" ry="33" fill="url(#metallic)"/>
  <!-- Inner bowl -->
  <ellipse cx="200" cy="222" rx="92" ry="28" fill="#1a2a25"/>
  <!-- Inner metallic shimmer -->
  <ellipse cx="187" cy="219" rx="42" ry="13" fill="#4a6e5c" opacity="0.3"/>
  <!-- Metallic highlights on body -->
  <path d="M132 252 Q142 250 152 254" stroke="#d4b088" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M252 257 Q262 252 272 258" stroke="#8ba5a0" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="368" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8ba5a0" letter-spacing="2">RAKU TEA BOWL</text>
</svg>